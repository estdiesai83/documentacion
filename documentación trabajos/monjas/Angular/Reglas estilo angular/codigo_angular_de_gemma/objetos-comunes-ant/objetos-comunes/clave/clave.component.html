<div class="titulo">INTRODUCE LA FIRMA</div>
<div class="informativo-contrasena">
   <ul class="contrasena">
      <li [ngClass]="{'activado' : this.clave.length >= 1}" class="primero"></li>
      <li [ngClass]="{'activado' : this.clave.length >= 2}" class="segundo"></li>
      <li [ngClass]="{'activado' : this.clave.length >= 3}" class="tercero"></li>
      <li [ngClass]="{'activado' : this.clave.length >= 4}" class="cuarto"></li>
   </ul>
</div>
<div class="teclado">
   <ul class="numericos" >
      <li (click)="pulsarDigito(number)" *ngFor="let number of [1,2,3,4,5,6,7,8,9,'salir',0,'limpiar']" class="numero">
         
         <span *ngIf="number !='salir' && number !='limpiar'">{{number}}</span>
         <span class="cerrar" *ngIf="number ==='salir'"><i class="fa fa-times"></i></span>
         <span class="limpiar"  *ngIf="number ==='limpiar'"><i class="fa fa-trash"></i></span>
      
      </li>
   </ul>
</div>
